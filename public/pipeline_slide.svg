  <rect x="200" y="660" width="1200" height="130" rx="14" fill="#FFFFFF" stroke="#E7E0D8" stroke-width="2"/>
  <text x="248" y="735" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="22" letter-spacing="3" fill="#E4572E">03</text>
  <text x="340" y="735" font-family="ui-sans-serif, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="30" fill="#1B1815">Human review queue, approved deals to Postgres (RLS)</text>
