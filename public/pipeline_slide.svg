      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#E4572E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#FAF8F5"/>

  <text x="200" y="112" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="22" letter-spacing="4" fill="#E4572E">PUB THURSDAYS · DEAL INGESTION PIPELINE</text>
  <text x="200" y="152" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="20" letter-spacing="2" fill="#78716C">ARCHITECTURE OVERVIEW</text>

  <!-- Stage 1 -->
  <rect x="200" y="230" width="1200" height="130" rx="14" fill="#FFFFFF" stroke="#E7E0D8" stroke-width="2"/>
  <text x="248" y="305" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="22" letter-spacing="3" fill="#E4572E">01</text>
