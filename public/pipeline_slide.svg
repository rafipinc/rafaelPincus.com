  <!-- Arrow 1 -->
  <line x1="800" y1="372" x2="800" y2="432" stroke="#E4572E" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 2 -->
  <rect x="200" y="445" width="1200" height="130" rx="14" fill="#FFFFFF" stroke="#E7E0D8" stroke-width="2"/>
  <text x="248" y="520" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="22" letter-spacing="3" fill="#E4572E">02</text>
  <text x="340" y="520" font-family="ui-sans-serif, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="30" fill="#1B1815">Gemini structured extraction, confidence scoring, dedupe</text>

  <!-- Arrow 2 -->
  <line x1="800" y1="587" x2="800" y2="647" stroke="#E4572E" stroke-width="2" marker-end="url(#arrow)"/>

